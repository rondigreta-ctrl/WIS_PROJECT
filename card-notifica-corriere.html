<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>WIS — Card notifica corriere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>
  :root{
    --primary-4:#F48457; --primary-5:#E84E0F; --primary-6:#DB3700;
    --grey-4:#D7D5D6; --grey-5:#A4A3A4; --grey-6:#747272;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; min-height:100dvh; display:flex; align-items:center; justify-content:center;
    background:#EAE9E9; font-family:'Inter',system-ui,sans-serif; padding:40px 20px;
  }
  .data{ font-family:'IBM Plex Mono',monospace; }

  .notif-card{
    width:360px; max-width:100%; background:#19181A; border-radius:28px; padding:20px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    color:#fff;
  }
  .notif-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .notif-eyebrow{ margin:0; font-size:11px; font-weight:700; letter-spacing:.6px; color:var(--primary-4); text-transform:uppercase; }
  .notif-sub{ margin:6px 0 0; font-size:14px; line-height:19px; color:rgba(255,255,255,.75); max-width:250px; }
  .notif-avatar{
    width:44px; height:44px; flex-shrink:0; border-radius:50%; background:#fff;
    border:2px solid var(--primary-5); display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .notif-avatar img{ width:84%; height:84%; object-fit:contain; }

  .notif-status-row{ display:flex; align-items:center; justify-content:space-between; margin-top:22px; }
  .notif-status-label{ margin:0 0 4px; font-size:13px; color:rgba(255,255,255,.55); }
  .notif-timer{ font-size:40px; font-weight:600; letter-spacing:.5px; }
  .notif-pill{
    display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:100px;
    background:rgba(255,255,255,.08); font-size:12px; font-weight:600; color:rgba(255,255,255,.75); white-space:nowrap;
  }
  .notif-pill .dot{ width:6px; height:6px; border-radius:50%; background:var(--grey-5); }

  .notif-divider{ height:1px; background:rgba(255,255,255,.1); margin:18px 0 14px; }

  .notif-list{ display:flex; flex-direction:column; gap:14px; }
  .notif-item{ display:flex; align-items:center; gap:12px; }
  .notif-item-icon{
    width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .notif-item.done .notif-item-icon{ background:var(--primary-5); color:#fff; }
  .notif-item.pending .notif-item-icon{ background:rgba(255,255,255,.08); color:rgba(255,255,255,.5); }
  .notif-item-text{ flex:1; font-size:14px; line-height:19px; }
  .notif-item.done .notif-item-text{ color:#fff; }
  .notif-item.pending .notif-item-text{ color:rgba(255,255,255,.45); }
  .notif-item-check{ color:var(--primary-4); flex-shrink:0; }

  .notif-actions{ display:flex; align-items:center; gap:10px; margin-top:20px; }
  .notif-btn{
    display:flex; align-items:center; justify-content:center; gap:6px; border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:700; border-radius:100px; padding:11px 18px;
  }
  .notif-btn-primary{ background:var(--primary-5); color:#fff; }
  .notif-btn-secondary{ background:rgba(255,255,255,.1); color:#fff; }
  .notif-link{
    margin-left:auto; display:flex; align-items:center; gap:2px; color:rgba(255,255,255,.6);
    font-size:13px; font-weight:600; text-decoration:none; white-space:nowrap;
  }
</style>
</head>
<body>

  <div class="notif-card">
    <div class="notif-top">
      <div>
        <p class="notif-eyebrow">Corriere alla porta</p>
        <p class="notif-sub">Qualcuno ha suonato il campanello all'ingresso</p>
      </div>
      <div class="notif-avatar"><img src="assets/Avatar WIS_Gewiss_new.png" alt="WIS"></div>
    </div>

    <div class="notif-status-row">
      <div>
        <p class="notif-status-label">In attesa da</p>
        <div class="notif-timer data">00:14</div>
      </div>
      <div class="notif-pill"><span class="dot"></span>In attesa</div>
    </div>

    <div class="notif-divider"></div>

    <div class="notif-list">
      <div class="notif-item done">
        <div class="notif-item-icon"><iconify-icon icon="solar:bell-linear" width="16" height="16"></iconify-icon></div>
        <div class="notif-item-text">Ho attivato la videocamera d'ingresso.</div>
        <iconify-icon class="notif-item-check" icon="solar:check-circle-bold" width="18" height="18"></iconify-icon>
      </div>
      <div class="notif-item pending">
        <div class="notif-item-icon"><iconify-icon icon="solar:videocamera-linear" width="16" height="16"></iconify-icon></div>
        <div class="notif-item-text">Registro una clip di 30 secondi.</div>
      </div>
      <div class="notif-item pending">
        <div class="notif-item-icon"><iconify-icon icon="solar:lock-keyhole-linear" width="16" height="16"></iconify-icon></div>
        <div class="notif-item-text">Ti avviso se non rispondi entro 1 minuto.</div>
      </div>
    </div>

    <div class="notif-actions">
      <button class="notif-btn notif-btn-primary" type="button">
        <iconify-icon icon="solar:microphone-linear" width="16" height="16"></iconify-icon>
        Rispondi
      </button>
      <button class="notif-btn notif-btn-secondary" type="button">
        <iconify-icon icon="solar:close-circle-linear" width="14" height="14"></iconify-icon>
        Ignora
      </button>
      <a class="notif-link" href="#">Apri app <iconify-icon icon="solar:alt-arrow-right-linear" width="14" height="14"></iconify-icon></a>
    </div>
  </div>

</body>
</html>
