<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>WIS — Widget iPhone buon weekend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>
  :root{
    --primary-4:#F48457; --primary-5:#E84E0F; --primary-6:#DB3700;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; min-height:100dvh; display:flex; align-items:center; justify-content:center;
    background:#EAE9E9; font-family:'Inter',system-ui,sans-serif; padding:40px 20px;
  }
  .data{ font-family:'IBM Plex Mono',monospace; }

  /* ---------- iPhone frame ---------- */
  .device{
    width:375px; height:812px; position:relative; background:#000; border-radius:54px;
    padding:12px; box-shadow:0 30px 60px -20px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.04);
    flex-shrink:0;
  }
  .device-inner{
    width:100%; height:100%; border-radius:44px; overflow:hidden; position:relative;
    background:
      radial-gradient(520px 420px at 18% 8%, rgba(244,132,87,.55), transparent 60%),
      radial-gradient(460px 460px at 92% 78%, rgba(219,55,0,.35), transparent 65%),
      linear-gradient(160deg,#100F10 0%,#1B1A1B 55%,#100F10 100%);
  }
  .notch{
    position:absolute; top:12px; left:50%; transform:translateX(-50%); width:120px; height:28px;
    background:#000; border-radius:20px; z-index:50;
  }
  .home-indicator{
    position:absolute; bottom:9px; left:50%; transform:translateX(-50%); width:144px; height:5px;
    background:#fff; opacity:.9; border-radius:100px; z-index:60; pointer-events:none;
  }
  .status-bar{
    position:absolute; top:0; left:0; right:0; height:54px; display:flex; align-items:center; justify-content:space-between;
    padding:21px 26px 19px; z-index:40; pointer-events:none;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif; color:#fff;
  }
  .status-time{ font-size:16px; font-weight:600; }
  .status-icons{ display:flex; gap:6px; align-items:center; color:#fff; }

  /* ---------- Home screen content ---------- */
  .home-screen{ position:relative; padding:64px 16px 0; height:100%; }

  /* ---------- Widget row: checklist + meteo side by side ---------- */
  .widget-row{ display:flex; align-items:flex-start; gap:14px; }

  /* ---------- Weekend checklist widget (narrow column) ---------- */
  .widget-large{
    flex:1; min-width:0; border-radius:24px; padding:14px 15px 13px;
    background:
      radial-gradient(200px 140px at 100% 0%, rgba(244,132,87,.16), transparent 70%),
      #19181A;
    box-shadow:0 14px 30px -10px rgba(0,0,0,.5);
    -webkit-tap-highlight-color:transparent;
  }
  .widget-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .widget-title{ margin:0; font-size:14.5px; font-weight:800; color:#fff; line-height:18px; letter-spacing:-.1px; }
  .widget-sub{ margin:3px 0 0; font-size:10.5px; color:rgba(255,255,255,.55); line-height:14px; }
  .widget-avatar{
    width:22px; height:22px; border-radius:50%; background:#fff; border:1.5px solid var(--primary-5);
    display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; margin-top:1px;
  }
  .widget-avatar img{ width:84%; height:84%; object-fit:contain; }

  .widget-checklist{ margin-top:11px; display:flex; flex-direction:column; gap:7px; }
  .widget-check-row{ display:flex; align-items:flex-start; gap:6px; }
  .widget-check-row iconify-icon{ color:var(--primary-4); flex-shrink:0; margin-top:1px; }
  .widget-check-row span{ font-size:11px; font-weight:500; color:rgba(255,255,255,.88); line-height:14px; }

  .widget-divider{ height:1px; background:rgba(255,255,255,.1); margin:12px 0 10px; }
  .widget-final{ margin:0; font-size:10px; line-height:13.5px; color:rgba(255,255,255,.6); text-align:center; }

  /* ---------- Meteo column ---------- */
  .meteo-col{ width:164px; flex-shrink:0; display:flex; flex-direction:column; gap:14px; }
  .meteo-widget{ width:100%; display:block; border-radius:24px; box-shadow:0 14px 30px -10px rgba(0,0,0,.5); }
  .meteo-icons{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; justify-items:center; }

  /* ---------- App icon grid (context only) ---------- */
  .app-grid{ margin-top:22px; display:grid; grid-template-columns:repeat(4,1fr); gap:20px 0; justify-items:center; }
  .app-icon{ width:58px; height:58px; border-radius:15px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,.25); }
  .app-icon iconify-icon{ color:#fff; }
  .app-icon.sm{ width:56px; height:56px; }

  .dock{
    position:absolute; left:16px; right:16px; bottom:34px; height:82px; border-radius:28px;
    background:rgba(255,255,255,.14); backdrop-filter:blur(20px);
    display:flex; align-items:center; justify-content:space-around; padding:0 14px;
  }
</style>
</head>
<body>

  <div class="device">
    <div class="notch"></div>
    <div class="home-indicator"></div>
    <div class="device-inner">

      <div class="status-bar">
        <div class="status-time">9:41</div>
        <div class="status-icons">
          <iconify-icon icon="ic:baseline-signal-cellular-4-bar" width="16" height="16"></iconify-icon>
          <iconify-icon icon="ic:baseline-wifi" width="17" height="17"></iconify-icon>
          <iconify-icon icon="ic:baseline-battery-full" width="21" height="21"></iconify-icon>
        </div>
      </div>

      <div class="home-screen">

        <div class="widget-row">
          <!-- WIS checklist widget: buon weekend -->
          <div class="widget-large">
            <div class="widget-top">
              <div>
                <p class="widget-title">Buon weekend Andrea</p>
                <p class="widget-sub">Ho controllato tutto prima che uscissi.</p>
              </div>
              <div class="widget-avatar"><img src="assets/Avatar WIS_Gewiss_new.png" alt="WIS"></div>
            </div>

            <div class="widget-checklist">
              <div class="widget-check-row"><iconify-icon icon="solar:check-circle-bold" width="14" height="14"></iconify-icon><span>Porta principale chiusa</span></div>
              <div class="widget-check-row"><iconify-icon icon="solar:check-circle-bold" width="14" height="14"></iconify-icon><span>Finestre chiuse — tutte</span></div>
              <div class="widget-check-row"><iconify-icon icon="solar:check-circle-bold" width="14" height="14"></iconify-icon><span>Luci spente</span></div>
              <div class="widget-check-row"><iconify-icon icon="solar:check-circle-bold" width="14" height="14"></iconify-icon><span>Elettrodomestici off</span></div>
              <div class="widget-check-row"><iconify-icon icon="solar:check-circle-bold" width="14" height="14"></iconify-icon><span>Allarme attivo</span></div>
            </div>

            <div class="widget-divider"></div>
            <p class="widget-final">La casa è in buone mani. Pensa solo al weekend.</p>
          </div>

          <!-- Meteo widget -->
          <div class="meteo-col">
            <img class="meteo-widget" src="uploads/meteo.png" alt="Meteo Milano">
            <div class="meteo-icons">
              <div class="app-icon sm" style="background:linear-gradient(160deg,#5A1A80,#9147C4);"><iconify-icon icon="solar:star-bold" width="24" height="24"></iconify-icon></div>
              <div class="app-icon sm" style="background:linear-gradient(160deg,#111,#333);"><iconify-icon icon="solar:widget-5-linear" width="24" height="24"></iconify-icon></div>
            </div>
          </div>
        </div>

        <!-- context: a row of app icons -->
        <div class="app-grid">
          <div class="app-icon" style="background:linear-gradient(160deg,#3AA0FF,#1B5E80);"><iconify-icon icon="solar:cloud-linear" width="26" height="26"></iconify-icon></div>
          <div class="app-icon" style="background:linear-gradient(160deg,#4C5408,#8FA30D);"><iconify-icon icon="solar:leaf-bold" width="26" height="26"></iconify-icon></div>
          <div class="app-icon" style="background:linear-gradient(160deg,#333,#111);"><iconify-icon icon="solar:letter-linear" width="26" height="26"></iconify-icon></div>
          <div class="app-icon" style="background:linear-gradient(160deg,#555,#222);"><iconify-icon icon="solar:settings-linear" width="26" height="26"></iconify-icon></div>
        </div>
      </div>

      <div class="dock">
        <div class="app-icon" style="background:linear-gradient(160deg,#E84E0F,#A32900);"><img src="assets/Head_Wis.png" alt="WIS" style="width:70%;height:70%;object-fit:contain;"></div>
        <div class="app-icon" style="background:linear-gradient(160deg,#333,#111);"><iconify-icon icon="solar:letter-linear" width="24" height="24"></iconify-icon></div>
        <div class="app-icon" style="background:linear-gradient(160deg,#3AA0FF,#1B5E80);"><iconify-icon icon="solar:calendar-linear" width="24" height="24"></iconify-icon></div>
        <div class="app-icon" style="background:linear-gradient(160deg,#555,#222);"><iconify-icon icon="solar:settings-linear" width="24" height="24"></iconify-icon></div>
      </div>

    </div>
  </div>

</body>
</html>
